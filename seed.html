async function runSeed() {
  const btn = document.getElementById("seedBtn");
  btn.disabled = true;
  const logEl = document.getElementById("log");
  logEl.innerHTML = "";

  log("🚀 Iniciando seed de base de datos HerraMax Plus 2026...\n", "info");

  // config real — marketing-herramax-plus-2026
    btn.disabled = false;
    return;

  let ok = 0;
  for (const mes of campaignData) {
    try {
      const { id, ...data } = mes;
      await db.collection("herramax_2026").doc(id).set(data);
      log(`✓ ${mes.name} — guardado correctamente`, "ok");
      ok++;
      await new Promise(r => setTimeout(r, 120));
    } catch (err) {
      log(`✗ Error en ${mes.name}: ${err.message}`, "err");
    }
  }

  // Config global
  try {
    await db.collection("config").doc("settings").set({
      campaignYear: 2026,
      brandName: "HerraMax Plus",
      brandColors: { primary: "#E07B0A", secondary: "#0D0D0D" },
      socialNetworks: ["instagram", "facebook", "tiktok"],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    log("✓ config/settings — guardado correctamente", "ok");
  } catch(e) {
    log(`✗ Error en config: ${e.message}`, "err");
  }

  log(`\n✅ Seed completado: ${ok}/12 meses cargados en Firestore.`, "ok");
  log("   Ahora puedes abrir admin.html para gestionar la campaña.", "info");
  btn.disabled = false;
}
